<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">DRAM 1T1C 存储单元：一个比特为什么要刷新</title>
  <desc id="desc">用一个晶体管加一个电容存一个比特。电容会漏电，所以需要周期性刷新。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <style>
      .title { font: 800 30px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .label { font: 800 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .mono  { font: 750 18px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #111827; }
      .hint  { font: 600 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
      .tiny  { font: 500 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    </style>
  </defs>

  <rect x="24" y="24" width="932" height="472" rx="34" fill="#fff" stroke="#111827" stroke-width="2.5" stroke-dasharray="8 9" />
  <text x="64" y="76" class="title">DRAM 的一个比特：1T1C（1 晶体管 + 1 电容）</text>

  <!-- bitline -->
  <line x1="220" y1="140" x2="220" y2="410" stroke="#2563eb" stroke-width="5" />
  <text x="220" y="124" class="label" text-anchor="middle">Bit Line</text>
  <text x="220" y="444" class="tiny" text-anchor="middle">连到“列”方向的放大器/感应电路</text>

  <!-- transistor -->
  <rect x="320" y="220" width="170" height="110" rx="16" fill="#dbeafe" stroke="#111827" stroke-width="2.5" />
  <text x="405" y="266" class="label" text-anchor="middle">Transistor</text>
  <text x="405" y="296" class="tiny" text-anchor="middle">开关：通 / 断</text>

  <!-- connections -->
  <line x1="220" y1="275" x2="320" y2="275" stroke="#111827" stroke-width="3" />
  <circle cx="220" cy="275" r="7" fill="#111827" />

  <!-- wordline -->
  <line x1="405" y1="220" x2="405" y2="160" stroke="#2563eb" stroke-width="4" />
  <line x1="290" y1="160" x2="520" y2="160" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)" />
  <text x="290" y="146" class="label">Word Line</text>
  <text x="290" y="182" class="tiny">行选通：决定这一行的晶体管“开不开”</text>

  <!-- capacitor -->
  <rect x="590" y="240" width="140" height="150" rx="18" fill="#fee2e2" stroke="#111827" stroke-width="2.5" />
  <text x="660" y="290" class="label" text-anchor="middle">Capacitor</text>
  <text x="660" y="320" class="tiny" text-anchor="middle">电荷 ≈ 0/1</text>
  <text x="660" y="350" class="tiny" text-anchor="middle">会漏电</text>

  <line x1="490" y1="275" x2="590" y2="275" stroke="#111827" stroke-width="3" />
  <circle cx="590" cy="275" r="7" fill="#111827" />

  <!-- refresh note -->
  <path d="M 790 210 C 860 230, 860 320, 790 340 C 720 360, 720 190, 790 210 Z" fill="#f3f4f6" stroke="#94a3b8" stroke-width="2" />
  <text x="790" y="252" class="hint" text-anchor="middle">电容漏电</text>
  <text x="790" y="278" class="hint" text-anchor="middle">必须定期“补电”</text>
  <text x="790" y="304" class="hint" text-anchor="middle">这就是刷新</text>

  <text x="64" y="466" class="mono">读一次 ≈ 先感应电荷，再把它写回去（读会“扰动”原状态）</text>
  <text x="64" y="490" class="tiny">这张图只画一个单元；现实中是行列矩阵，一次“行选通”会把一整行的单元连上 bit line。</text>
</svg>

